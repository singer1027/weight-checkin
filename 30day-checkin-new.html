<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30天减脂打卡 · 我的蜕变计划</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --warm-white: #fff9f2;
    --blush: #f2c4b0;
    --rose: #d97b5a;
    --deep-rose: #b85c3c;
    --sage: #8aab8e;
    --deep-sage: #5a7d5e;
    --charcoal: #2c2420;
    --mid: #6b5a52;
    --light-mid: #b09a90;
    --border: #e8ddd6;
    --highlight: #fff3ee;
    --success: #6aab6e;
    --locked-bg: #f5ede8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--charcoal);
    color: var(--cream);
    padding: 28px 24px 22px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: var(--rose);
    opacity: 0.15;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: 30%;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: var(--blush);
    opacity: 0.1;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 700;
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .header h1 span {
    color: var(--blush);
  }
  .header-sub {
    font-size: 12px;
    color: var(--light-mid);
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }
  .goal-tag {
    background: var(--rose);
    color: white;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
    align-self: center;
  }

  /* STATS BAR */
  .stats-bar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .stats-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .stat-item .label { color: var(--light-mid); }
  .stat-item .val {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--rose);
    font-size: 15px;
  }
  .stat-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }
  .progress-wrap {
    flex: 1;
    min-width: 160px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blush), var(--rose));
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .progress-text {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--mid);
    white-space: nowrap;
  }

  /* DIET TIPS */
  .tips-banner {
    background: linear-gradient(135deg, #fff8f4, #fdf0e8);
    border: 1px solid #f0d8cc;
    border-radius: 10px;
    padding: 12px 18px;
    margin: 16px 24px 0;
    max-width: calc(1400px - 0px);
    margin-left: auto;
    margin-right: auto;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12.5px;
    color: var(--mid);
    line-height: 1.7;
  }
  .tips-banner .tips-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .tips-banner strong { color: var(--deep-rose); }

  /* TABLE WRAPPER */
  .table-wrapper {
    padding: 20px 24px 12px;
    max-width: 1400px;
    margin: 0 auto;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    min-width: 960px;
    border-collapse: separate;
    border-spacing: 0 6px;
  }

  thead th {
    font-size: 11px;
    font-weight: 500;
    color: var(--light-mid);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 10px;
    text-align: left;
    white-space: nowrap;
    font-family: 'DM Mono', monospace;
    position: sticky;
    top: 0;
    background: var(--cream);
    z-index: 10;
    box-shadow: 0 2px 6px rgba(44,36,32,0.07);
  }
  thead th:first-child { padding-left: 16px; }

  .table-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  tbody tr {
    background: white;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(44,36,32,0.05);
    transition: box-shadow 0.2s;
  }
  tbody tr:hover { box-shadow: 0 3px 12px rgba(44,36,32,0.09); }
  tbody tr.completed {
    background: var(--locked-bg);
    opacity: 0.85;
  }
  tbody tr.today {
    box-shadow: 0 0 0 2px var(--rose), 0 3px 12px rgba(217,123,90,0.15);
  }

  tbody td {
    padding: 10px 8px;
    vertical-align: middle;
  }
  tbody td:first-child { padding-left: 14px; border-radius: 10px 0 0 10px; }
  tbody td:last-child { padding-right: 14px; border-radius: 0 10px 10px 0; }

  .day-cell {
    min-width: 72px;
  }
  .day-num {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 14px;
    color: var(--charcoal);
  }
  .day-date {
    font-size: 10px;
    color: var(--light-mid);
    margin-top: 1px;
  }
  .today-badge {
    display: inline-block;
    font-size: 9px;
    background: var(--rose);
    color: white;
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* Inputs */
  input[type="number"], input[type="text"] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 12.5px;
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--warm-white);
    color: var(--charcoal);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    min-width: 0;
  }
  input[type="number"]:focus, input[type="text"]:focus {
    border-color: var(--rose);
    background: white;
  }
  input[type="number"] { max-width: 70px; text-align: center; }
  .meal-input { min-width: 120px; }

  /* Sport multi-select chips */
  .sport-checks {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .sport-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 9px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--warm-white);
    font-size: 11.5px;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
    white-space: nowrap;
  }
  .sport-tag input[type=checkbox] { display: none; }
  .sport-tag:hover { border-color: var(--rose); color: var(--rose); background: #fff3ee; }
  .sport-tag.active {
    background: var(--rose);
    border-color: var(--rose);
    color: white;
    font-weight: 500;
  }
  .sport-tag.locked { pointer-events: none; opacity: 0.7; }

  /* Sport hint card */
  .sport-hint {
    margin-top: 5px;
    font-size: 11px;
    color: var(--mid);
    background: #fff8f4;
    border: 1px solid #f0d8cc;
    border-radius: 6px;
    padding: 5px 8px;
    line-height: 1.5;
    min-width: 180px;
  }
  .sport-hint:empty { display: none; }
  .sport-snack {
    color: var(--deep-sage);
    font-weight: 500;
  }

  .sport-cell { min-width: 200px; }
  .sport-row { display: flex; align-items: center; gap: 6px; }
  .random-btn {
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .random-btn:hover { background: var(--deep-sage); transform: scale(1.05); }
  .random-btn:active { transform: scale(0.95); }

  /* Checkbox */
  .check-cell { text-align: center; min-width: 54px; }
  .custom-check {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: white;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    display: inline-block;
    position: relative;
    transition: all 0.2s;
    vertical-align: middle;
  }
  .custom-check:checked {
    background: var(--success);
    border-color: var(--success);
  }
  .custom-check:checked::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 13px;
    font-weight: bold;
  }

  /* Locked state */
  tr.completed input:not(.custom-check),
  tr.completed select {
    background: var(--locked-bg);
    color: var(--mid);
    pointer-events: none;
    border-color: transparent;
  }
  tr.completed .custom-check {
    pointer-events: auto;
    cursor: pointer;
  }
  tr.completed .random-btn {
    pointer-events: none;
    opacity: 0.4;
  }

  /* BOTTOM ACTIONS */
  .actions {
    padding: 15px 24px 15px;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--rose);
    color: white;
  }
  .btn-primary:hover { background: var(--deep-rose); }
  .btn-secondary {
    background: white;
    color: var(--mid);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--rose); color: var(--rose); }
  .btn-danger {
    background: white;
    color: #c0392b;
    border: 1px solid #f0c0bc;
  }
  .btn-danger:hover { background: #fff0ee; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--charcoal);
    color: var(--cream);
    padding: 10px 22px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  .table-wrapper::-webkit-scrollbar { height: 4px; }
  .table-wrapper::-webkit-scrollbar-track { background: var(--border); border-radius: 2px; }
  .table-wrapper::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 2px; }

  /* ── 横屏手机 / 小平板 (≤900px) ───────────────── */
  @media (max-width: 900px) {
    table { min-width: 700px; }
    .sport-cell { min-width: 160px; }
    .meal-input { min-width: 90px; font-size: 11.5px; }
    input[type="number"] { max-width: 58px; font-size: 12px; }
  }

  /* ── 竖屏手机 (≤600px) 卡片布局 ────────────────── */
  @media (max-width: 600px) {
    .header { padding: 16px 14px 14px; }
    .header h1 { font-size: 18px; }
    .header-sub { font-size: 11px; }
    .goal-tag { font-size: 11px; padding: 4px 10px; }
    .stats-bar { padding: 10px 14px; }
    .stats-inner { gap: 10px; }
    .stat-item { font-size: 12px; }
    .stat-item .val { font-size: 13px; }
    .stat-divider { display: none; }
    .tips-banner { margin: 10px 14px 0; font-size: 11.5px; padding: 10px 12px; }
    .table-wrapper { display: none; }
    .card-list { display: block !important; padding: 12px 14px 4px; }
    .actions { padding: 12px 14px 30px; gap: 8px; }
    .btn { font-size: 12px; padding: 8px 14px; }
    .plan-selector { flex-wrap: wrap; gap: 6px; font-size: 11px; }
    .plan-selector select { font-size: 11px; max-width: 160px; }
  }

  /* ── 卡片列表（默认隐藏，手机竖屏显示）────────── */
  .card-list { display: none; }

  .day-card {
    background: white;
    border-radius: 14px;
    box-shadow: 0 1px 6px rgba(44,36,32,0.07);
    margin-bottom: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .day-card.today-card {
    box-shadow: 0 0 0 2px var(--rose), 0 3px 12px rgba(217,123,90,0.15);
  }
  .day-card.completed-card { background: var(--locked-bg); opacity: 0.88; }
  .day-card.completed-card input:not(.custom-check),
  .day-card.completed-card select {
    background: var(--locked-bg);
    color: var(--mid);
    pointer-events: none;
    border-color: transparent;
  }
  .day-card.completed-card .custom-check {
    pointer-events: auto;
    cursor: pointer;
  }
  .day-card.completed-card .sport-tag { pointer-events: none; opacity: 0.7; }
  .day-card.completed-card .random-btn { pointer-events: none; opacity: 0.4; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .card-day-num {
    font-family: 'DM Mono', monospace;
    font-weight: 600; font-size: 15px; color: var(--charcoal);
  }
  .card-day-date { font-size: 11px; color: var(--light-mid); margin-top: 1px; }
  .card-body { padding: 10px 14px 12px; display: flex; flex-direction: column; gap: 8px; }

  .card-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .card-metric { display: flex; flex-direction: column; gap: 3px; }
  .card-metric label { font-size: 10px; color: var(--light-mid); font-weight: 500; }
  .card-metric input[type="number"] {
    max-width: 100%; width: 100%; text-align: center; font-size: 13px; padding: 6px 4px;
  }

  .card-section-title {
    font-size: 10px; color: var(--light-mid); font-weight: 500; margin-bottom: 4px;
    font-family: 'DM Mono', monospace; letter-spacing: 0.05em; text-transform: uppercase;
  }

  .card-meals { display: flex; flex-direction: column; gap: 6px; }
  .card-meal { display: flex; flex-direction: column; gap: 3px; }
  .card-meal label { font-size: 10px; color: var(--light-mid); font-weight: 500; }
  .card-meal input[type="text"] { font-size: 12.5px; padding: 6px 8px; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px 10px;
    border-top: 1px solid var(--border);
    background: rgba(250,246,240,0.6);
  }
  .card-done-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500; color: var(--mid); cursor: pointer;
  }
  .card-done-label .custom-check { width: 20px; height: 20px; }

  /* ── AUTH MODAL ────────────────────────────────── */
  .auth-overlay {
    position: fixed; inset: 0;
    background: rgba(44,36,32,0.55);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .auth-overlay.hidden { display: none; }

  .auth-card {
    background: var(--warm-white);
    border-radius: 18px;
    padding: 36px 32px 28px;
    width: 100%; max-width: 380px;
    box-shadow: 0 24px 60px rgba(44,36,32,0.22);
    position: relative;
  }
  .auth-logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px; font-weight: 700;
    color: var(--charcoal); margin-bottom: 4px;
  }
  .auth-logo span { color: var(--rose); }
  .auth-sub { font-size: 12px; color: var(--light-mid); margin-bottom: 24px; }

  .auth-tabs { display: flex; gap: 0; margin-bottom: 22px; border-bottom: 2px solid var(--border); }
  .auth-tab {
    flex: 1; padding: 8px; text-align: center;
    font-size: 13px; font-weight: 500; color: var(--light-mid);
    cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: all 0.2s;
  }
  .auth-tab.active { color: var(--rose); border-bottom-color: var(--rose); }

  .auth-form { display: flex; flex-direction: column; gap: 12px; }
  .auth-form.hidden { display: none; }

  .auth-field { display: flex; flex-direction: column; gap: 5px; }
  .auth-field label { font-size: 11.5px; color: var(--mid); font-weight: 500; }
  .auth-field input {
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    font-size: 13.5px;
    font-family: 'Noto Sans SC', sans-serif;
    background: white;
    color: var(--charcoal);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    max-width: 100%;
  }
  .auth-field input:focus { border-color: var(--rose); }

  .auth-btn {
    margin-top: 6px; padding: 12px;
    background: var(--rose); color: white;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer; transition: background 0.2s;
    width: 100%;
  }
  .auth-btn:hover { background: var(--deep-rose); }
  .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .auth-error {
    font-size: 12px; color: #c0392b;
    background: #fff0ee; border: 1px solid #f0c0bc;
    border-radius: 7px; padding: 8px 12px;
    display: none;
  }
  .auth-error.show { display: block; }

  /* 用户信息栏 */
  .user-bar {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--light-mid);
  }
  .user-bar strong { color: var(--cream); font-size: 13px; }
  .user-bar .logout-btn {
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent; color: var(--light-mid);
    font-size: 11px; cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .user-bar .logout-btn:hover { border-color: var(--blush); color: var(--blush); }

  /* Plan selector */
  .plan-selector {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--light-mid);
  }
  .plan-selector select {
    padding: 3px 8px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: var(--cream); font-size: 12px;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer; outline: none;
  }
  .plan-selector select option { background: var(--charcoal); }
  .new-plan-btn {
    padding: 3px 10px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent; color: var(--blush);
    font-size: 11px; cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
  }
  .new-plan-btn:hover { background: rgba(242,196,176,0.15); }

  /* Saving indicator */
  .saving-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--sage);
    margin-left: 6px; opacity: 0;
    transition: opacity 0.2s;
    vertical-align: middle;
  }
  .saving-dot.active { opacity: 1; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<!-- ── 登录/注册弹窗 ─────────────────────────────── -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">30天减脂打卡<span>·</span>蜕变计划</div>
    <div class="auth-sub">登录后数据将同步至云端，支持多设备访问</div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">登录</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">注册</div>
    </div>

    <!-- 登录表单 -->
    <div class="auth-form" id="form-login">
      <div class="auth-field"><label>手机号</label><input type="tel" id="login-phone" placeholder="请输入11位手机号" maxlength="11"></div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  配置
// ═══════════════════════════════════════════════════════
const API_BASE = 'http://localhost:8000';   // ← 部署后改为你的服务器地址

const SPORTS = ['羽毛球社交局', '公园探险快走', '健身操蹦迪夜', '公园快走', '游泳'];
const SPORT_DETAIL = {
  '羽毛球社交局': { icon:'🏸', detail:'双打40分钟 + 公园快走10分钟（回程）', snack:'运动前加餐：半根香蕉' },
  '公园探险快走': { icon:'🚶', detail:'快走50分钟，探索公园新路线（爬小坡、绕湖）', snack:'运动前加餐：1杯无糖酸奶' },
  '健身操蹦迪夜': { icon:'🕺', detail:'跟团课45分钟 + 拉伸5分钟', snack:'运动前加餐：1个苹果' },
  '公园快走':     { icon:'🏃', detail:'5分钟普通走+2分钟冲刺走（重复6组）+ 10分钟台阶训练', snack:'运动前加餐：半根玉米/一片全麦面包' },
  '游泳':         { icon:'🏊', detail:'自由泳/蛙泳45-60分钟，中间可休息', snack:'运动前加餐：1个香蕉或半片全麦面包' },
};

// ═══════════════════════════════════════════════════════
//  状态
// ═══════════════════════════════════════════════════════
let STATE = {
  token:      null,
  user:       null,       // { id, username, goal_weight }
  planId:     null,
  startDate:  null,
  plans:      [],
  data:       {},         // { "2026-03-06": { weight, waist, ... } }
  saveTimers: {},         // 防抖计时器
};

// ═══════════════════════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════════════════════
function getTodayStr() { return new Date().toISOString().slice(0,10); }

function getDateStr(dayIndex) {
  const d = new Date(STATE.startDate);
  d.setDate(d.getDate() + dayIndex);
  return d.toISOString().slice(0,10);
}

function getWeekday(dateStr) {
  const days = ['日','一','二','三','四','五','六'];
  return '周' + days[new Date(dateStr).getDay()];
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

function showSaving(on) {
  document.getElementById('saving-dot').classList.toggle('active', on);
}

// ═══════════════════════════════════════════════════════
//  API 请求封装
// ═══════════════════════════════════════════════════════
async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (STATE.token) headers['Authorization'] = 'Bearer ' + STATE.token;
  const res = await fetch(API_BASE + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.detail || `请求失败 (${res.status})`);
  return json;
}

// ═══════════════════════════════════════════════════════
//  认证 Modal
// ═══════════════════════════════════════════════════════
function switchTab(tab) {
  document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  const phone    = document.getElementById('login-phone').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');
  errEl.classList.remove('show');
  if (!phone || !password) { errEl.textContent = '请填写手机号和密码'; errEl.classList.add('show'); return; }
  if (!phone.match(/^\d{11}$/)) { errEl.textContent = '请输入正确的11位手机号'; errEl.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = '登录中…';
  try {
    const data = await api('POST', '/auth/login', { phone, password });
    onAuthSuccess(data);
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = '登录';
  }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const phone    = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;
  const goal     = parseFloat(document.getElementById('reg-goal').value) || null;
  const errEl    = document.getElementById('reg-error');
  const btn      = document.getElementById('reg-btn');
  errEl.classList.remove('show');
  if (!username || !phone || !password) { errEl.textContent = '请填写所有必填项'; errEl.classList.add('show'); return; }
  if (!phone.match(/^\d{11}$/)) { errEl.textContent = '请输入正确的11位手机号'; errEl.classList.add('show'); return; }
  if (password.length < 6) { errEl.textContent = '密码至少6位'; errEl.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = '注册中…';
  try {
    const data = await api('POST', '/auth/register', { username, phone, password, goal_weight: goal });
    onAuthSuccess(data);
    // 新用户自动创建计划
    const today = getTodayStr();
    await api('POST', '/plans', { title: '30天减脂计划', start_date: today });
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = '注册并开始';
  }
}

function onAuthSuccess(data) {
  STATE.token = data.token;
  STATE.user  = { id: data.user_id, username: data.username, goal_weight: data.goal_weight };
  localStorage.setItem('slim_token', data.token);
  document.getElementById('auth-overlay').classList.add('hidden');
  document.getElementById('user-name').textContent = data.username;
  document.getElementById('user-bar').style.display = 'flex';
  loadPlans();
}

function doLogout() {
  STATE = { token:null, user:null, planId:null, startDate:null, plans:[], data:{}, saveTimers:{} };
  localStorage.removeItem('slim_token');
  document.getElementById('user-bar').style.display = 'none';
  document.getElementById('plan-bar').style.display = 'none';
  document.getElementById('table-body').innerHTML = '';
  document.getElementById('auth-overlay').classList.remove('hidden');
  updateStats();
}

// ═══════════════════════════════════════════════════════
//  计划管理
// ═══════════════════════════════════════════════════════
async function loadPlans() {
  try {
    STATE.plans = await api('GET', '/plans');
  } catch(e) {
    showToast('⚠️ 无法加载计划：' + e.message); return;
  }

  const sel = document.getElementById('plan-select');
  sel.innerHTML = '';
  if (STATE.plans.length === 0) {
    // 还没有计划，弹出新建
    openNewPlan(); return;
  }
  STATE.plans.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `${p.title}（${p.start_date}）`;
    if (p.is_active) opt.selected = true;
    sel.appendChild(opt);
  });

  document.getElementById('plan-bar').style.display = 'block';
  const activePlan = STATE.plans.find(p => p.is_active) || STATE.plans[0];
  await switchPlan(activePlan.id, activePlan.start_date);
}

async function onPlanChange() {
  const planId = parseInt(document.getElementById('plan-select').value);
  const plan   = STATE.plans.find(p => p.id === planId);
  if (plan) await switchPlan(plan.id, plan.start_date);
}

async function switchPlan(planId, startDate) {
  STATE.planId      = planId;
  STATE.startDate   = startDate;
  STATE.data        = {};
  STATE.currentPlan = STATE.plans.find(p => p.id === planId) || {};
  updateHeaderInfo();

  try {
    const rows = await api('GET', `/checkins/${planId}`);
    rows.forEach(r => { STATE.data[r.date] = r; });
  } catch(e) {
    showToast('⚠️ 加载打卡数据失败：' + e.message);
  }
  buildTable();
  scrollToToday();
}

function updateHeaderInfo() {
  const start = STATE.startDate;
  if (!start) return;
  const endDate = new Date(start);
  endDate.setDate(endDate.getDate() + 29);
  const endStr  = endDate.toISOString().slice(0,10);
  const today   = getTodayStr();
  const dayNum  = Math.floor((new Date(today) - new Date(start)) / 86400000) + 1;
  const inRange = dayNum >= 1 && dayNum <= 30;
  const goalW   = STATE.currentPlan && STATE.currentPlan.goal_weight;
  const startW  = STATE.currentPlan && STATE.currentPlan.start_weight;

  document.getElementById('header-sub').textContent =
    `${start.replace(/-/g,'.')} — ${endStr.replace(/-/g,'.')}${inRange ? ' · 今日第' + dayNum + '天' : ''}`;

  if (startW) document.getElementById('stat-start-weight').textContent = startW;
  if (startW && goalW) {
    const diff = Math.round((startW - goalW) * 10) / 10;
    document.getElementById('goal-tag').textContent = `🎯 目标 −${diff}斤`;
  } else if (goalW) {
    document.getElementById('goal-tag').textContent = `🎯 目标 ${goalW}斤`;
  }
}

function openNewPlan() {
  document.getElementById('np-date').value = getTodayStr();
  document.getElementById('np-title').value = '30天减脂计划';
  document.getElementById('np-start-weight').value = '';
  document.getElementById('np-goal-weight').value = '';
  document.getElementById('np-error').classList.remove('show');
  document.getElementById('newplan-overlay').classList.remove('hidden');
}
function closeNewPlan() {
  document.getElementById('newplan-overlay').classList.add('hidden');
}

async function doCreatePlan() {
  const title       = document.getElementById('np-title').value.trim() || '30天减脂计划';
  const date        = document.getElementById('np-date').value;
  const startWeight = parseFloat(document.getElementById('np-start-weight').value) || null;
  const goalWeight  = parseFloat(document.getElementById('np-goal-weight').value) || null;
  const errEl       = document.getElementById('np-error');
  errEl.classList.remove('show');
  if (!date) { errEl.textContent = '请选择开始日期'; errEl.classList.add('show'); return; }
  try {
    await api('POST', '/plans', {
      title,
      start_date:   date,
      start_weight: startWeight,
      goal_weight:  goalWeight,
    });
    closeNewPlan();
    await loadPlans();
    showToast('✅ 新计划已创建！');
  } catch(e) {
    errEl.textContent = e.message; errEl.classList.add('show');
  }
}

// ═══════════════════════════════════════════════════════
//  表格渲染
// ═══════════════════════════════════════════════════════
function buildTable() {
  if (!STATE.startDate) return;
  const today = getTodayStr();
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  for (let i = 0; i < 30; i++) {
    const dateStr = getDateStr(i);
    const d       = STATE.data[dateStr] || {};
    const isToday = dateStr === today;
    const done    = !!d.is_done;
    const sports  = Array.isArray(d.sports) ? d.sports : (d.sports ? JSON.parse(d.sports) : []);

    const tr = document.createElement('tr');
    tr.id = 'row-' + i;
    if (done) tr.classList.add('completed');
    if (isToday) tr.classList.add('today');

    tr.innerHTML = `
      <td class="day-cell">
        <div class="day-num">Day ${i+1}${isToday ? '<span class="today-badge">今日</span>' : ''}</div>
        <div class="day-date">${dateStr.slice(5)} ${getWeekday(dateStr)}</div>
      </td>
      <td><input type="number" step="0.1" min="30" max="200" placeholder="—" value="${d.weight||''}" data-field="weight" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}></td>
      <td><input type="number" step="0.5" min="30" max="150" placeholder="—" value="${d.waist||''}" data-field="waist" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}></td>
      <td><input type="number" step="0.5" min="20" max="100" placeholder="—" value="${d.thigh||''}" data-field="thigh" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}></td>
      <td class="sport-cell">
        <div class="sport-checks">
          ${SPORTS.map(s => {
            const sel  = sports.includes(s);
            const info = SPORT_DETAIL[s];
            return `<label class="sport-tag ${sel?'active':''} ${done?'locked':''}">
              <input type="checkbox" data-field="sports" data-day="${i}" data-sport="${s}" ${sel?'checked':''} ${done?'disabled':''} onchange="onSportChange(this)">
              ${info.icon} ${s}
            </label>`;
          }).join('')}
        </div>
        <div class="sport-row" style="margin-top:5px">
          <button class="random-btn" onclick="randomSport(${i})" ${done?'disabled':''}>🎲 随机</button>
        </div>
        <div class="sport-hint" id="hint-${i}">${buildHintHTML(sports)}</div>
      </td>
      <td class="check-cell">
        <input type="checkbox" class="custom-check" data-day="${i}" ${done?'checked':''} onchange="onCheckChange(this)">
      </td>
      <td><input type="text" class="meal-input" placeholder="碳水+蛋白质+蔬菜：比例约为1:1:2（拳头大小）" value="${d.lunch||''}" data-field="lunch" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}></td>
      <td><input type="text" class="meal-input" placeholder="酸奶100g 或 水果100g" value="${d.snack||''}" data-field="snack" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}></td>
      <td><input type="text" class="meal-input" placeholder="碳水+蛋白质+蔬菜：比例约为1:1:2（拳头大小）" value="${d.dinner||''}" data-field="dinner" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}></td>
    `;
    tbody.appendChild(tr);
  }
  buildCards();
  updateStats();
}

// ═══════════════════════════════════════════════════════
//  手机卡片渲染
// ═══════════════════════════════════════════════════════
function buildCards() {
  if (!STATE.startDate) return;
  const today   = getTodayStr();
  const cardList = document.getElementById('card-list');
  cardList.innerHTML = '';

  for (let i = 0; i < 30; i++) {
    const dateStr = getDateStr(i);
    const d       = STATE.data[dateStr] || {};
    const isToday = dateStr === today;
    const done    = !!d.is_done;
    const sports  = Array.isArray(d.sports) ? d.sports : [];

    const card = document.createElement('div');
    card.id = 'card-' + i;
    card.className = 'day-card' + (done ? ' completed-card' : '') + (isToday ? ' today-card' : '');

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-day-num">Day ${i+1}${isToday ? '<span class="today-badge">今日</span>' : ''}</div>
          <div class="card-day-date">${dateStr.slice(5)} ${getWeekday(dateStr)}</div>
        </div>
        <label class="card-done-label">
          <input type="checkbox" class="custom-check" data-day="${i}" ${done?'checked':''} onchange="onCheckChange(this)">
          <span class="done-text">${done ? '已完成' : '完成打卡'}</span>
        </label>
      </div>
      <div class="card-body">
        <div class="card-metrics">
          <div class="card-metric">
            <label>空腹体重(斤)</label>
            <input type="number" step="0.1" min="30" max="200" placeholder="—" value="${d.weight||''}" data-field="weight" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}>
          </div>
          <div class="card-metric">
            <label>腰围(cm)</label>
            <input type="number" step="0.5" min="30" max="150" placeholder="—" value="${d.waist||''}" data-field="waist" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}>
          </div>
          <div class="card-metric">
            <label>大腿围(cm)</label>
            <input type="number" step="0.5" min="20" max="100" placeholder="—" value="${d.thigh||''}" data-field="thigh" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}>
          </div>
        </div>

        <div>
          <div class="card-section-title">运动模式</div>
          <div class="sport-checks">
            ${SPORTS.map(s => {
              const sel  = sports.includes(s);
              const info = SPORT_DETAIL[s];
              return `<label class="sport-tag ${sel?'active':''} ${done?'locked':''}">
                <input type="checkbox" data-field="sports" data-day="${i}" data-sport="${s}" ${sel?'checked':''} ${done?'disabled':''} onchange="onSportChange(this)">
                ${info.icon} ${s}
              </label>`;
            }).join('')}
            <button class="random-btn" onclick="randomSport(${i})" ${done?'disabled':''}>🎲</button>
          </div>
          <div class="sport-hint" id="card-hint-${i}">${buildHintHTML(sports)}</div>
        </div>

        <div class="card-meals">
          <div class="card-section-title">饮食记录</div>
          <div class="card-meal">
            <label>午餐</label>
            <input type="text" placeholder="碳水+蛋白质+蔬菜" value="${d.lunch||''}" data-field="lunch" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}>
          </div>
          <div class="card-meal">
            <label>下午加餐</label>
            <input type="text" placeholder="酸奶100g 或 水果100g" value="${d.snack||''}" data-field="snack" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}>
          </div>
          <div class="card-meal">
            <label>晚餐</label>
            <input type="text" placeholder="碳水+蛋白质+蔬菜" value="${d.dinner||''}" data-field="dinner" data-day="${i}" onchange="onFieldChange(this)" ${done?'disabled':''}>
          </div>
        </div>
      </div>
    `;
    cardList.appendChild(card);
  }
}

// ═══════════════════════════════════════════════════════
//  打卡操作 → 防抖后同步到 API
// ═══════════════════════════════════════════════════════

// 本地立即更新 STATE.data，然后防抖 800ms 后发 API
function patchLocal(dateStr, patch) {
  if (!STATE.data[dateStr]) STATE.data[dateStr] = {};
  Object.assign(STATE.data[dateStr], patch);
}

function scheduleSave(dayIndex, immediate = false) {
  const dateStr = getDateStr(dayIndex);
  clearTimeout(STATE.saveTimers[dayIndex]);
  const delay = immediate ? 0 : 800;
  STATE.saveTimers[dayIndex] = setTimeout(() => saveCheckin(dateStr), delay);
}

async function saveCheckin(dateStr) {
  if (!STATE.planId) return;
  const d = STATE.data[dateStr] || {};
  showSaving(true);
  try {
    await api('PUT', `/checkins/${STATE.planId}/${dateStr}`, {
      weight:      d.weight      ? parseFloat(d.weight)  : null,
      waist:       d.waist       ? parseFloat(d.waist)   : null,
      thigh:       d.thigh       ? parseFloat(d.thigh)   : null,
      sports:      Array.isArray(d.sports) ? d.sports : [],
      lunch:       d.lunch  || null,
      snack:       d.snack  || null,
      dinner:      d.dinner || null,
      is_done:     !!d.is_done,
    });
  } catch(e) {
    showToast('❌ 保存失败：' + e.message);
  } finally {
    setTimeout(() => showSaving(false), 600);
  }
}

function onFieldChange(el) {
  const day   = parseInt(el.dataset.day);
  const field = el.dataset.field;
  const dateStr = getDateStr(day);
  patchLocal(dateStr, { [field]: el.value });
  scheduleSave(day);
  if (field === 'weight') updateStats();
}

function onCheckChange(el) {
  const day     = parseInt(el.dataset.day);
  const checked = el.checked;
  const dateStr = getDateStr(day);
  patchLocal(dateStr, { is_done: checked });

  // 同步所有同一天的 checkbox（卡片和表格可能各有一个）
  document.querySelectorAll('.custom-check[data-day="' + day + '"]').forEach(cb => {
    cb.checked = checked;
  });

  // ── 更新桌面表格行 ──
  const tr = document.getElementById('row-' + day);
  if (tr) {
    if (checked) {
      tr.classList.add('completed');
      tr.querySelectorAll('input:not(.custom-check)').forEach(i => i.setAttribute('disabled', true));
      tr.querySelectorAll('.sport-tag').forEach(t => t.classList.add('locked'));
      tr.querySelectorAll('.random-btn').forEach(b => b.setAttribute('disabled', true));
    } else {
      tr.classList.remove('completed');
      tr.querySelectorAll('input:not(.custom-check)').forEach(i => i.removeAttribute('disabled'));
      tr.querySelectorAll('.sport-tag').forEach(t => t.classList.remove('locked'));
      tr.querySelectorAll('.random-btn').forEach(b => b.removeAttribute('disabled'));
    }
  }

  // ── 更新手机卡片 ──
  const card = document.getElementById('card-' + day);
  if (card) {
    if (checked) {
      card.classList.add('completed-card');
      card.querySelectorAll('input:not(.custom-check)').forEach(i => i.setAttribute('disabled', true));
      card.querySelectorAll('.sport-tag').forEach(t => t.classList.add('locked'));
      card.querySelectorAll('.random-btn').forEach(b => b.setAttribute('disabled', true));
    } else {
      card.classList.remove('completed-card');
      card.querySelectorAll('input:not(.custom-check)').forEach(i => i.removeAttribute('disabled'));
      card.querySelectorAll('.sport-tag').forEach(t => t.classList.remove('locked'));
      card.querySelectorAll('.random-btn').forEach(b => b.removeAttribute('disabled'));
    }
    // 更新完成文字
    const doneText = card.querySelector('.done-text');
    if (doneText) doneText.textContent = checked ? '已完成' : '完成打卡';
  }

  if (checked) showToast('✅ 第' + (day+1) + '天已完成打卡，加油！');
  scheduleSave(day, true);
  updateStats();
}

function buildHintHTML(sports) {
  if (!sports || sports.length === 0) return '';
  return sports.filter(s => SPORT_DETAIL[s]).map(s => {
    const info = SPORT_DETAIL[s];
    return `<div style="margin-bottom:3px">${info.icon} <strong>${s}</strong>：${info.detail}<br><span class="sport-snack">${info.snack}</span></div>`;
  }).join('');
}

function onSportChange(el) {
  const day   = parseInt(el.dataset.day);
  const sport = el.dataset.sport;
  const dateStr = getDateStr(day);
  if (!STATE.data[dateStr]) STATE.data[dateStr] = {};
  let sports = Array.isArray(STATE.data[dateStr].sports) ? [...STATE.data[dateStr].sports] : [];
  if (el.checked) { if (!sports.includes(sport)) sports.push(sport); }
  else { sports = sports.filter(s => s !== sport); }
  patchLocal(dateStr, { sports });

  const label = el.closest('.sport-tag');
  el.checked ? label.classList.add('active') : label.classList.remove('active');
  const hint = document.getElementById('hint-' + day);
  if (hint) hint.innerHTML = buildHintHTML(sports);
  const cardHint = document.getElementById('card-hint-' + day);
  if (cardHint) cardHint.innerHTML = buildHintHTML(sports);
  scheduleSave(day);
}

function randomSport(dayIndex) {
  const sport   = SPORTS[Math.floor(Math.random() * SPORTS.length)];
  const dateStr = getDateStr(dayIndex);

  // 更新表格行（桌面）
  const tr = document.getElementById('row-' + dayIndex);
  if (tr) {
    tr.querySelectorAll('input[data-field="sports"]').forEach(cb => {
      cb.checked = false;
      cb.closest('.sport-tag').classList.remove('active');
    });
    const target = tr.querySelector(`input[data-sport="${sport}"]`);
    if (target) { target.checked = true; target.closest('.sport-tag').classList.add('active'); }
    const hint = document.getElementById('hint-' + dayIndex);
    if (hint) hint.innerHTML = buildHintHTML([sport]);
  }

  // 更新卡片（手机）
  const card = document.getElementById('card-' + dayIndex);
  if (card) {
    card.querySelectorAll('input[data-field="sports"]').forEach(cb => {
      cb.checked = false;
      cb.closest('.sport-tag').classList.remove('active');
    });
    const cardTarget = card.querySelector(`input[data-sport="${sport}"]`);
    if (cardTarget) { cardTarget.checked = true; cardTarget.closest('.sport-tag').classList.add('active'); }
    const cardHint = document.getElementById('card-hint-' + dayIndex);
    if (cardHint) cardHint.innerHTML = buildHintHTML([sport]);
  }

  patchLocal(dateStr, { sports: [sport] });
  scheduleSave(dayIndex);
  showToast(`🎲 随机推荐：${SPORT_DETAIL[sport].icon} ${sport}`);
}

function updateStats() {
  const today = getTodayStr();
  let done = 0;
  Object.values(STATE.data).forEach(d => { if (d.is_done || d.done) done++; });

  document.getElementById('stat-done').textContent = done;
  document.getElementById('progress-fill').style.width = (done/30*100) + '%';
  document.getElementById('progress-text').textContent = done + '/30天';

  const todayData = STATE.data[today];
  document.getElementById('stat-weight').textContent =
    (todayData && todayData.weight) ? todayData.weight : '—';
}

// ═══════════════════════════════════════════════════════
//  导出 CSV（基于内存数据）
// ═══════════════════════════════════════════════════════
function exportCSV() {
  if (!STATE.startDate) { showToast('请先登录并选择计划'); return; }
  const headers = ['日期','空腹体重(斤)','腰围(cm)','大腿围(cm)','运动模式','完成','午餐','加餐','晚餐'];
  const rows = [headers];
  for (let i = 0; i < 30; i++) {
    const dateStr = getDateStr(i);
    const d = STATE.data[dateStr] || {};
    const sports = Array.isArray(d.sports) ? d.sports.join('+') : '';
    rows.push([dateStr, d.weight||'', d.waist||'', d.thigh||'', sports,
               (d.is_done||d.done) ? '✓' : '', d.lunch||'', d.snack||'', d.dinner||'']);
  }
  const csv = '\uFEFF' + rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href = url;
  a.download = '30天减脂打卡.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('📤 CSV 已导出');
}

// ═══════════════════════════════════════════════════════
//  重置（清空当前计划全部打卡，需逐条删除或后端支持）
// ═══════════════════════════════════════════════════════
async function resetAll() {
  if (!STATE.planId) { showToast('请先选择计划'); return; }
  if (!confirm('确定要删除当前计划的全部打卡记录吗？此操作不可撤销。')) return;
  try {
    await api('DELETE', `/plans/${STATE.planId}`);
    showToast('🗑 已删除，正在刷新…');
    await loadPlans();
  } catch(e) {
    showToast('❌ 删除失败：' + e.message);
  }
}

// ═══════════════════════════════════════════════════════
//  滚动到今天
// ═══════════════════════════════════════════════════════
function scrollToToday() {
  const today = getTodayStr();
  for (let i = 0; i < 30; i++) {
    if (getDateStr(i) === today) {
      // 桌面表格
      const row = document.getElementById('row-' + i);
      if (row) setTimeout(() => row.scrollIntoView({behavior:'smooth', block:'center'}), 400);
      // 手机卡片
      const card = document.getElementById('card-' + i);
      if (card) setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'center'}), 400);
      break;
    }
  }
}

// ═══════════════════════════════════════════════════════
//  初始化：检查本地 token → 自动登录
// ═══════════════════════════════════════════════════════
async function init() {
  const savedToken = localStorage.getItem('slim_token');
  if (!savedToken) return; // 未登录，保持弹窗显示

  STATE.token = savedToken;
  try {
    const me = await api('GET', '/auth/me');
    STATE.user = { id: me.id, username: me.username, goal_weight: me.goal_weight };
    document.getElementById('user-name').textContent = me.username;
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('auth-overlay').classList.add('hidden');
    await loadPlans();
  } catch(e) {
    // token 过期
    localStorage.removeItem('slim_token');
    STATE.token = null;
  }
}

init();
</script>
